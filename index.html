<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>РСМ-Электро: Инженерная панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            margin: 0; padding: 12px;
        }
        /* Стили для вкладок (Табов) */
        .tabs {
            display: flex;
            overflow-x: auto;
            gap: 6px;
            margin-bottom: 16px;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #ccc);
        }
        .tab-btn {
            padding: 8px 14px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
        }
        .tab-btn.active {
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border-color: var(--tg-theme-button-color, #2481cc);
        }
        .calc-panel { display: none; }
        .calc-panel.active { display: block; }

        /* Стили форм */
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 4px; font-size: 13px; color: var(--tg-theme-hint-color, #999); }
        input {
            width: 100%; padding: 10px; box-sizing: border-box;
            border: 1px solid var(--tg-theme-hint-color, #ccc); border-radius: 8px;
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000); font-size: 15px;
        }
        .btn {
            width: 100%; padding: 12px; font-size: 15px; font-weight: bold; border: none; border-radius: 8px;
            background-color: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff);
            cursor: pointer; margin-top: 6px;
        }
        .results {
            margin-top: 14px; padding: 12px; background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 8px; border-left: 4px solid var(--tg-theme-button-color, #2481cc); display: none;
        }
        .results h4 { margin: 0 0 6px 0; color: var(--tg-theme-button-color, #2481cc); }
        .results p { margin: 4px 0; font-size: 14px; }
        .sub-block {
            border: 1px solid var(--tg-theme-hint-color, #ccc);
            padding: 12px; border-radius: 8px; margin-bottom: 16px;
            background-color: var(--tg-theme-bg-color, #parent);
        }
        .sub-block h4 { margin: 0 0 10px 0; color: var(--tg-theme-text-color); border-bottom: 1px dashed var(--tg-theme-hint-color); padding-bottom: 4px; }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab(event, 'core')">Железо</button>
        <button class="tab-btn" onclick="switchTab(event, 'section')">Сечение</button>
        <button class="tab-btn" onclick="switchTab(event, 'voltage')">Напряжение</button>
        <button class="tab-btn" onclick="switchTab(event, 'alum')">Алюминий</button>
        <button class="tab-btn" onclick="switchTab(event, 'tire')">Шина / Провод</button>
    </div>

    <div id="panel-core" class="calc-panel active">
        <h3>Расчет по железу</h3>
        <div class="form-group"><label>Ширина стержня (a), см</label><input type="number" id="core_a" step="0.1" value="3.5"></div>
        <div class="form-group"><label>Толщина набора (b), см</label><input type="number" id="core_b" step="0.1" value="4.0"></div>
        <div class="form-group"><label>Входное напряжение (U1), В</label><input type="number" id="core_vin" value="220"></div>
        <div class="form-group"><label>Выходное напряжение (U2), В</label><input type="number" id="core_vout" value="12"></div>
        
        <div style="text-align: center; margin: 15px 0;">
            <img src="core_schema.jpg" alt="Схема сердечника" style="max-width: 100%; height: auto; border-radius: 8px; border: 1px solid var(--tg-theme-hint-color, #ccc);">
        </div>

        <button class="btn" onclick="calcCore()">Рассчитать</button>
        <div id="res-core" class="results"><h4>Результаты:</h4><p id="out-core-p"></p></div>
    </div>

    <div id="panel-section" class="calc-panel">
        <h3>Калькулятор сечения</h3>
        <div class="form-group"><label>Количество витков</label><input type="number" id="sec_turns" value="100"></div>
        <div class="form-group"><label>Старый диаметр, мм</label><input type="number" id="sec_old" step="0.01" value="0.5"></div>
        <div class="form-group"><label>Новый диаметр, мм</label><input type="number" id="sec_new" step="0.01" value="0.6"></div>
        <button class="btn" onclick="calcSection()">Рассчитать</button>
        <div id="res-section" class="results"><h4>Результаты:</h4><p id="out-sec-p"></p></div>
    </div>

    <div id="panel-voltage" class="calc-panel">
        <h3>Калькулятор напряжения</h3>
        <div class="form-group"><label>Количество витков</label><input type="number" id="volt_turns" value="500"></div>
        <div class="form-group"><label>Старое напряжение, В</label><input type="number" id="volt_old_u" value="220"></div>
        <div class="form-group"><label>Новое напряжение, В</label><input type="number" id="volt_new_u" value="380"></div>
        <div class="form-group"><label>Диаметр старого провода, мм</label><input type="number" id="volt_old_d" step="0.01" value="0.4"></div>
        <button class="btn" onclick="calcVoltage()">Рассчитать</button>
        <div id="res-voltage" class="results"><h4>Результаты:</h4><p id="out-volt-p"></p></div>
    </div>

    <div id="panel-alum" class="calc-panel">
        <h3>Алюминий на медь</h3>
        <div class="form-group"><label>Диаметр алюминиевого провода, мм</label><input type="number" id="alum_d" step="0.01" value="0.5"></div>
        <button class="btn" onclick="calcAlum()">Рассчитать</button>
        <div id="res-alum" class="results"><h4>Результаты:</h4><p id="out-alum-p"></p></div>
    </div>

    <div id="panel-tire" class="calc-panel">
        <h3>Пересчет шины и круглого провода</h3>

        <div class="sub-block">
            <h4>1. Из круглого провода в шину</h4>
            <div class="form-group"><label>Диаметр круглого провода, мм</label><input type="number" id="tire_d" step="0.01" value="1.5"></div>
            <button class="btn" onclick="calcTire()">Рассчитать сечение шины</button>
            <div id="res-tire" class="results"><h4>Результат:</h4><p id="out-tire-p"></p></div>
        </div>

        <div class="sub-block">
            <h4>2. Из прямоугольной шины в провод</h4>
            <div class="form-group"><label>Ширина шины, мм</label><input type="number" id="tire_width" step="0.1" value="3.0"></div>
            <div class="form-group"><label>Толщина шины, мм</label><input type="number" id="tire_thick" step="0.1" value="2.0"></div>
            <button class="btn" onclick="calcWireFromTire()">Рассчитать диаметр провода</button>
            <div id="res-wire-from-tire" class="results"><h4>Результат:</h4><p id="out-wire-from-tire-p"></p></div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); tg.expand();

        function switchTab(event, tabName) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.calc-panel').forEach(p => p.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('panel-' + tabName).classList.add('active');
        }

        async function sendApiRequest(url, bodyData, resId, outId, formatFn) {
            try {
                const baseUrl = 'https://litigator-atlantic-aloe.ngrok-free.dev';
                
                const response = await fetch(baseUrl + url, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    },
                    body: JSON.stringify(bodyData)
                });
                if (response.ok) {
                    const res = await response.json();
                    document.getElementById(outId).innerHTML = formatFn(res);
                    document.getElementById(resId).style.display = 'block';
                } else { alert('Ошибка сервера при расчете'); }
            } catch (e) { alert('Ошибка сети: ' + e); }
        }

        function calcCore() {
            const data = {
                a_cm: parseFloat(document.getElementById('core_a').value),
                b_cm: parseFloat(document.getElementById('core_b').value),
                volt_in: parseFloat(document.getElementById('core_vin').value),
                volt_out: parseFloat(document.getElementById('core_vout').value)
            };
            sendApiRequest('/api/calc-core', data, 'res-core', 'out-core-p', r =>
                `<b>Мощность:</b> ${r.power} Вт<br><b>Первичка:</b> ${r.t1} вит. (Ø ${r.d1} мм)<br><b>Вторичка:</b> ${r.t2} вит. (Ø ${r.d2} мм)`
            );
        }

        function calcSection() {
            const data = {
                turns: parseInt(document.getElementById('sec_turns').value),
                old_diam: parseFloat(document.getElementById('sec_old').value),
                new_diam: parseFloat(document.getElementById('sec_new').value)
            };
            sendApiRequest('/api/calc-section', data, 'res-section', 'out-sec-p', r =>
                `<b>Витков по сечению:</b> ${r.by_section}<br><b>Витков по диаметру:</b> ${r.by_diam}`
            );
        }

        function calcVoltage() {
            const data = {
                turns: parseInt(document.getElementById('volt_turns').value),
                old_volt: parseFloat(document.getElementById('volt_old_u').value),
                new_volt: parseFloat(document.getElementById('volt_new_u').value),
                new_diam: parseFloat(document.getElementById('volt_old_d').value)
            };
            sendApiRequest('/api/calc-voltage', data, 'res-voltage', 'out-volt-p', r =>
                `<b>Новое число витков:</b> ${r.turns}<br><b>Новый диаметр:</b> ${r.diam_mm} мм`
            );
        }

        function calcAlum() {
            const data = { au_diam_wire: parseFloat(document.getElementById('alum_d').value) };
            sendApiRequest('/api/calc-aluminium', data, 'res-alum', 'out-alum-p', r =>
                `<b>Эквивалентный медный провод:</b><br>Диаметр: ${r.diam_mm} мм<br>Сечение: ${r.section_mm2} мм²`
            );
        }

        function calcTire() {
            const data = { diam_wire: parseFloat(document.getElementById('tire_d').value) };
            sendApiRequest('/api/calc-tire', data, 'res-tire', 'out-tire-p', r =>
                `<b>Необходимая площадь сечения шины:</b> ${r.tire_section} мм²`
            );
        }

        function calcWireFromTire() {
            const data = {
                width: parseFloat(document.getElementById('tire_width').value),
                thickness: parseFloat(document.getElementById('tire_thick').value)
            };
            sendApiRequest('/api/calc-wire-from-tire', data, 'res-wire-from-tire', 'out-wire-from-tire-p', r =>
                `<b>Сечение шины:</b> ${r.section} мм²<br><b>Эквивалентный круглый провод:</b> Ø ${r.diam_mm} мм`
            );
        }
    </script>
</body>
</html>
